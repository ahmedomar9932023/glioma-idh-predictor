<script>
const TIMELINE = [
  { id: 'p2', delay: 0,    dur: 3800 },
  { id: 'p3', delay: 3000, dur: 1000 },
  { id: 'p1', delay: 4000, dur: 600  },
];
const CYCLE = 6800;

const style = document.createElement('style');
style.textContent = `
  @keyframes inkReveal {
    0%   { opacity:0; clip-path: inset(0 100% 0 0); }
    2%   { opacity:1; }
    100% { opacity:1; clip-path: inset(0 0% 0 0); }
  }
`;
document.head.appendChild(style);

function play() {
  ['p1','p2','p3'].forEach(id => {
    const el = document.getElementById(id);
    el.style.cssText = 'fill:#1a2e6e; opacity:0; clip-path:inset(0 100% 0 0); animation:none;';
  });
  document.body.getBoundingClientRect();
  TIMELINE.forEach(({ id, delay, dur }) => {
    setTimeout(() => {
      const el = document.getElementById(id);
      el.style.cssText = `fill:#1a2e6e; animation: inkReveal ${dur}ms cubic-bezier(0.25,0,0.1,1) forwards;`;
    }, delay);
  });
  setTimeout(play, CYCLE);
}

play();
</script>
